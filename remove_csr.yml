---
- name: Remove IKEv2 route-based VPN tunnel from Cisco CSR
  hosts: all
  gather_facts: false

  pre_tasks:
    # ---------- Normalize inputs into eff_* facts (extra-vars-safe) ----------
    - name: Normalize critical inputs into eff_* facts
      ansible.builtin.set_fact:
        eff_tunnel_desc:        "{{ tunnel_desc        | default('')             | trim }}"
        eff_routing_type:       "{{ routing_type       | default('dynamic', true) | trim | lower }}"
        eff_keyring_name:       "{{ keyring_name       | default('',        true) | trim }}"
        eff_profile_name:       "{{ profile_name       | default('',        true) | trim }}"
        eff_ipsec_profile_name: "{{ ipsec_profile_name | default('',        true) | trim }}"
        eff_acl_name:           "{{ acl_name           | default('',        true) | trim }}"
        eff_csr_pl_name:        "{{ csr_pl_name        | default('CSR_LIST', true) | trim }}"
        eff_local_asn:          "{{ local_asn          | default(398957,    true) }}"
        eff_remove_acl:         "{{ remove_acl         | default(true,      true) }}"
        eff_remove_static_routes:    "{{ remove_static_routes    | default(true, true) }}"
        eff_remove_bgp_networks:     "{{ remove_bgp_networks     | default(true, true) }}"
        eff_remove_bgp_neighbor:     "{{ remove_bgp_neighbor     | default(true, true) }}"
        eff_remove_csr_list_entries: "{{ remove_csr_list_entries | default(true, true) }}"
        eff_remove_inbound_pl:       "{{ remove_inbound_pl       | default(true, true) }}"
        eff_remove_outbound_pl:      "{{ remove_outbound_pl      | default(true, true) }}"
        eff_remove_inbound_rm:       "{{ remove_inbound_rm       | default(true, true) }}"
        eff_remove_outbound_rm:      "{{ remove_outbound_rm      | default(true, true) }}"

    # ---------- Basic input validation ----------
    - name: Validate routing_type
      ansible.builtin.assert:
        that:
          - eff_routing_type in ['dynamic', 'static']
        fail_msg: "routing_type must be 'dynamic' or 'static'"

    - name: Validate tunnel_id, tunnel_desc, remote_peer_ip
      ansible.builtin.assert:
        that:
          - tunnel_id is defined and (tunnel_id | int) > 0
          - (eff_tunnel_desc | length) > 0
          - remote_peer_ip is defined and (remote_peer_ip | length) > 0
        fail_msg: "tunnel_id, tunnel_desc, and remote_peer_ip are required"

    # ---------- SAFETY GATE 1: confirm_tunnel_id must match ----------
    - name: SAFETY — operator must re-type tunnel_id in confirm_tunnel_id
      ansible.builtin.assert:
        that:
          - confirm_tunnel_id is defined
          - (confirm_tunnel_id | int) == (tunnel_id | int)
        fail_msg: >-
          REFUSING TO PROCEED. confirm_tunnel_id ({{ confirm_tunnel_id | default('<unset>') }})
          must equal tunnel_id ({{ tunnel_id }}).

    # ---------- Derive effective object names (same logic as deploy) ----------
    - name: Derive safe_desc & effective object names
      ansible.builtin.set_fact:
        safe_desc: "{{ eff_tunnel_desc | regex_replace('\\s+', '_') }}"

    - name: Compute fallback names if blank
      ansible.builtin.set_fact:
        effective_keyring_name:       "{{ eff_keyring_name       if (eff_keyring_name       | length) > 0 else ('KEYRING_'    ~ safe_desc ~ '_T' ~ tunnel_id) }}"
        effective_profile_name:       "{{ eff_profile_name       if (eff_profile_name       | length) > 0 else ('PROF_'       ~ safe_desc ~ '_T' ~ tunnel_id) }}"
        effective_ipsec_profile_name: "{{ eff_ipsec_profile_name if (eff_ipsec_profile_name | length) > 0 else ('IPSEC_PROF_T' ~ tunnel_id) }}"
        effective_acl_name:           "{{ eff_acl_name           if (eff_acl_name           | length) > 0 else safe_desc }}"

    # ---------- SAFETY GATE 2: Tunnel must exist ----------
    - name: SAFETY — read running-config for Tunnel{{ tunnel_id }}
      cisco.ios.ios_command:
        commands: "show running-config interface Tunnel{{ tunnel_id }}"
      register: tun_exists
      failed_when: false
      changed_when: false

    - name: SAFETY — abort if Tunnel{{ tunnel_id }} is not present
      ansible.builtin.assert:
        that:
          - "'interface Tunnel' ~ (tunnel_id | string) in (tun_exists.stdout[0] | default(''))"
        fail_msg: >-
          Tunnel{{ tunnel_id }} does not exist on this device. Nothing to remove.

    # ---------- SAFETY GATE 3: remote_peer_ip must match tunnel destination ----------
    - name: SAFETY — abort if remote_peer_ip does not match tunnel destination
      ansible.builtin.assert:
        that:
          - "'tunnel destination ' ~ remote_peer_ip in (tun_exists.stdout[0] | default(''))"
        fail_msg: >-
          remote_peer_ip mismatch. Survey says {{ remote_peer_ip }}, but
          Tunnel{{ tunnel_id }} has a different 'tunnel destination'. Refusing to proceed.

    # ---------- Parse local_networks ----------
    - name: Build ln_entries (net, mask, bits) from local_networks
      ansible.builtin.set_fact:
        ln_entries: >-
          {%- set octet = {'0':0,'128':1,'192':2,'224':3,'240':4,'248':5,'252':6,'254':7,'255':8} -%}
          {%- set out = [] -%}
          {%- for raw in (local_networks | default('')).splitlines() -%}
          {%-   set line = raw | trim -%}
          {%-   if line | length > 0 -%}
          {%-     if '/' in line and (line.split() | length) == 1 -%}
          {%-       set net  = line.split('/')[0] -%}
          {%-       set bits = line.split('/')[1] | int -%}
          {%-       set _full = (bits // 8) -%}
          {%-       set _rem  = (bits %  8) -%}
          {%-       set _tab  = {0:'0',1:'128',2:'192',3:'224',4:'240',5:'248',6:'252',7:'254',8:'255'} -%}
          {%-       set parts = [] -%}
          {%-       for i in range(4) -%}
          {%-         if i < _full %}{%- set _ = parts.append('255') -%}
          {%-         elif i == _full %}{%- set _ = parts.append(_tab[_rem]) -%}
          {%-         else %}{%- set _ = parts.append('0') -%}{%- endif -%}
          {%-       endfor -%}
          {%-       set _ = out.append({'net': net, 'mask': parts | join('.'), 'bits': bits}) -%}
          {%-     elif (line.split() | length) >= 2 -%}
          {%-       set p = line.split() -%}
          {%-       set mo = p[1].split('.') -%}
          {%-       if (mo | length) == 4 -%}
          {%-         set bits = octet.get(mo[0],0)+octet.get(mo[1],0)+octet.get(mo[2],0)+octet.get(mo[3],0) -%}
          {%-         set _ = out.append({'net': p[0], 'mask': p[1], 'bits': bits}) -%}
          {%-       endif -%}
          {%-     endif -%}
          {%-   endif -%}
          {%- endfor -%}
          {{ out }}

    # ---------- CSR_LIST line discovery (IOS-include compatible) ----------
    - name: Read current CSR_LIST entries (running-config)
      cisco.ios.ios_command:
        commands: "show running-config | include ip prefix-list {{ eff_csr_pl_name }} "
      register: pl_show
      changed_when: false
      failed_when: false

    - name: Compute pl_remove_lines (full CSR_LIST lines matching ln_entries)
      ansible.builtin.set_fact:
        pl_remove_lines: >-
          {%- set out = [] -%}
          {%- set txt = pl_show.stdout[0] | default('') -%}
          {%- for e in (ln_entries | default([])) -%}
          {%-   set pat = 'ip prefix-list ' ~ (eff_csr_pl_name | regex_escape) ~ ' seq \\d+ permit ' ~ (e.net | regex_escape) ~ '/' ~ (e.bits | string) ~ '(?:\\s+(?:le|ge)\\s+\\d+)*' -%}
          {%-   for m in (txt | regex_findall(pat)) -%}
          {%-     if m not in out -%}{%- set _ = out.append(m) -%}{%- endif -%}
          {%-   endfor -%}
          {%- endfor -%}
          {{ out }}

    - name: Show planned removal summary (debug)
      ansible.builtin.debug:
        msg:
          tunnel_id:               "{{ tunnel_id }}"
          tunnel_desc:             "{{ eff_tunnel_desc }}"
          remote_peer_ip:          "{{ remote_peer_ip }}"
          routing_type:            "{{ eff_routing_type }}"
          bgp_neighbor_ip:         "{{ bgp_neighbor_ip | default('<none>') }}"
          keyring_name:            "{{ effective_keyring_name }}"
          profile_name:            "{{ effective_profile_name }}"
          ipsec_profile_name:      "{{ effective_ipsec_profile_name }}"
          acl_name:                "{{ effective_acl_name }}     (remove={{ eff_remove_acl }})"
          local_asn:               "{{ eff_local_asn }}"
          csr_pl_name:             "{{ eff_csr_pl_name }}"
          ln_entries:              "{{ ln_entries }}"
          pl_remove_lines:         "{{ pl_remove_lines }}"
          remove_static_routes:    "{{ eff_remove_static_routes }}"
          remove_bgp_networks:     "{{ eff_remove_bgp_networks }}"
          remove_bgp_neighbor:     "{{ eff_remove_bgp_neighbor }}"
          remove_csr_list_entries: "{{ eff_remove_csr_list_entries }}"

  tasks:
    # ------------------------------------------------------------------
    # Each "fragile" cleanup is its own task — failures don't cascade.
    # Order: BGP network → BGP neighbor → static routes → CSR_LIST
    #        → template push for the rest.
    # ------------------------------------------------------------------

    - name: Remove BGP network statements
      cisco.ios.ios_config:
        parents:
          - "router bgp {{ eff_local_asn }}"
          - "address-family ipv4"
        lines: "no network {{ item.net }} mask {{ item.mask }}"
      loop: "{{ ln_entries | default([]) }}"
      when:
        - eff_remove_bgp_networks | bool
        - (ln_entries | default([]) | length) > 0
      failed_when: false

    - name: Remove BGP neighbor (dynamic mode)
      cisco.ios.ios_config:
        parents: "router bgp {{ eff_local_asn }}"
        lines: "no neighbor {{ bgp_neighbor_ip }}"
      when:
        - eff_remove_bgp_neighbor | bool
        - eff_routing_type == 'dynamic'
        - bgp_neighbor_ip is defined and (bgp_neighbor_ip | length) > 0
      failed_when: false

    - name: Remove static routes via Tunnel{{ tunnel_id }} (static mode)
      cisco.ios.ios_config:
        lines: "no ip route {{ item.net }} {{ item.mask }} Tunnel{{ tunnel_id }} name {{ safe_desc }}_NET{{ idx }}"
      loop: "{{ ln_entries | default([]) }}"
      loop_control:
        index_var: idx0
      vars:
        idx: "{{ idx0 + 1 }}"
      when:
        - eff_remove_static_routes | bool
        - eff_routing_type == 'static'
        - (ln_entries | default([]) | length) > 0
      failed_when: false

    - name: Remove CSR_LIST entries for this tunnel's networks
      cisco.ios.ios_config:
        lines: "no {{ item }}"
      loop: "{{ pl_remove_lines | default([]) }}"
      when:
        - eff_remove_csr_list_entries | bool
        - (pl_remove_lines | default([]) | length) > 0
      failed_when: false

    # ------------------------------------------------------------------
    # Template push for "safe" items: interface, peer route, sla, track,
    # crypto stack, ACL, dynamic-mode prefix-list/route-map.
    # ------------------------------------------------------------------
    - name: Push removal config (safe items)
      cisco.ios.ios_config:
        src: templates/remove_tunnel.j2
      register: cfg
      vars:
        routing_type: "{{ eff_routing_type }}"

    - name: Save startup-config
      cisco.ios.ios_command:
        commands: write memory
      when: cfg.changed

    - name: Show removed lines (template push)
      ansible.builtin.debug:
        var: cfg.commands
      when: cfg.changed

  post_tasks:
    - name: Verify — Tunnel{{ tunnel_id }} is gone
      cisco.ios.ios_command:
        commands:
          - "show ip interface brief | include Tunnel{{ tunnel_id }}"
      register: vfy_intf
      changed_when: false

    - name: Verify — running-config BGP section
      cisco.ios.ios_command:
        commands:
          - "show running-config | section bgp"
      register: vfy_bgp
      changed_when: false

    - name: Verify — CSR_LIST state
      cisco.ios.ios_command:
        commands:
          - "show ip prefix-list {{ eff_csr_pl_name }}"
      register: vfy_pl
      changed_when: false

    - name: Verify — IKEv2 / IPsec residuals
      cisco.ios.ios_command:
        commands:
          - "show running-config | include ^crypto ikev2 keyring {{ effective_keyring_name }}$|^crypto ikev2 profile {{ effective_profile_name }}$|^crypto ipsec profile {{ effective_ipsec_profile_name }}$|^ip access-list extended {{ effective_acl_name }}$"
      register: vfy_residual
      changed_when: false

    - name: Print verification — interface check (should be empty)
      ansible.builtin.debug:
        msg: "{{ vfy_intf.stdout[0].splitlines() }}"

    - name: Print verification — BGP section
      ansible.builtin.debug:
        msg: "{{ vfy_bgp.stdout[0].splitlines() }}"

    - name: Print verification — CSR_LIST after removal
      ansible.builtin.debug:
        msg: "{{ vfy_pl.stdout[0].splitlines() }}"

    - name: Print verification — residual crypto/ACL objects (should be empty)
      ansible.builtin.debug:
        msg: "{{ vfy_residual.stdout[0].splitlines() }}"
