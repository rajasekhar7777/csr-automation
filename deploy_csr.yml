
---
- name: Deploy IKEv2 route-based VPN tunnel on Cisco CSR
  hosts: all
  gather_facts: false

  pre_tasks:
    - name: Validate routing_type
      ansible.builtin.assert:
        that:
          - routing_type is defined
          - routing_type in ['dynamic', 'static']
        fail_msg: "routing_type must be 'dynamic' or 'static'"

    - name: Validate tunnel_id, tunnel_desc
      ansible.builtin.assert:
        that:
          - tunnel_id is defined and (tunnel_id | int) > 0
          - tunnel_desc is defined and (tunnel_desc | length) > 0
        fail_msg: "tunnel_id and tunnel_desc are required"

    - name: Validate BGP fields when routing_type=dynamic
      ansible.builtin.assert:
        that:
          - bgp_neighbor_ip is defined and (bgp_neighbor_ip | length) > 0
          - remote_asn is defined and (remote_asn | int) > 0
        fail_msg: "routing_type=dynamic requires bgp_neighbor_ip and remote_asn"
      when: routing_type == 'dynamic'

    - name: Validate local_networks when routing_type=static
      ansible.builtin.assert:
        that:
          - local_networks is defined and (local_networks | length) > 0
        fail_msg: "routing_type=static requires local_networks (one 'NETWORK MASK' per line)"
      when: routing_type == 'static'

    # ---------- csr_pl_lege handling ----------

    - name: Validate csr_pl_lege format — blank OR 'le N' (N=0..32)
      ansible.builtin.assert:
        that:
          - >
            (csr_pl_lege is not defined)
            or ((csr_pl_lege | trim | length) == 0)
            or ((csr_pl_lege | trim) is match('^le\s+([0-9]|[12][0-9]|3[0-2])$'))
        fail_msg: >
          'csr_pl_lege' must be blank OR exactly 'le N' where N is 0..32.
          Valid: 'le 24', 'le 30', 'le 32', ''.
          NOT valid: 'le 33', 'ge 24 le 32', 'permit ...', '32'.

    - name: Extract numeric N from csr_pl_lege (-1 if blank)
      ansible.builtin.set_fact:
        pl_le_value: >-
          {{ (csr_pl_lege | trim | regex_replace('^le\s+', '') | int)
             if (csr_pl_lege is defined and (csr_pl_lege | trim | length) > 0)
             else -1 }}

    - name: Compute /M (bits) for each entry in local_networks
      ansible.builtin.set_fact:
        pl_mask_bits: >-
          {%- set octet = {'0':0,'128':1,'192':2,'224':3,'240':4,'248':5,'252':6,'254':7,'255':8} -%}
          {%- set out = [] -%}
          {%- for line in (local_networks | default('')).splitlines() -%}
            {%- set p = line.split() -%}
            {%- if (p | length) >= 2 -%}
              {%- set bits = 0 -%}
              {%- for o in p[1].split('.') -%}
                {%- set bits = bits + octet.get(o, 0) -%}
              {%- endfor -%}
              {%- set _ = out.append(bits) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ out }}
      when: routing_type == 'static'

    - name: Enforce 'le N' >= /M for every local_network (static mode)
      ansible.builtin.assert:
        that:
          - (pl_le_value | int) >= (item | int)
        fail_msg: >
          csr_pl_lege 'le {{ pl_le_value }}' is invalid: must be >=
          the prefix length of every network. Offending /M = /{{ item }}.
          (Cisco requires M <= X <= 32 in 'permit A.B.C.D/M le X'.)
      loop: "{{ pl_mask_bits | default([]) }}"
      when:
        - routing_type == 'static'
        - (pl_le_value | int) >= 0

    - name: Enforce 'le N' >= /M of csr_pl_entry (dynamic mode, when used)
      ansible.builtin.assert:
        that:
          - (pl_le_value | int) >= ((csr_pl_entry | regex_replace('^.*/', '')) | int)
        fail_msg: >
          csr_pl_lege 'le {{ pl_le_value }}' must be >= csr_pl_entry's /M
          ({{ csr_pl_entry }}).
      when:
        - routing_type == 'dynamic'
        - (pl_le_value | int) >= 0
        - csr_pl_entry is defined
        - (csr_pl_entry | default('') | length) > 0
        - "'/' in (csr_pl_entry | default(''))"

    # ---------- derived facts ----------

    - name: Compute peer tunnel host
      ansible.builtin.set_fact:
        tunnel_peer_ip: >-
          {%- set parts = tunnel_local_ip.split('.') -%}
          {%- set last  = parts[-1] | int -%}
          {%- set off   = 1 if (last % 4) == 1 else -1 -%}
          {{ parts[0:3] | join('.') }}.{{ last + off }}

    - name: Decide effective IP-SLA target (override if survey provides one)
      ansible.builtin.set_fact:
        effective_sla_target: "{{ sla_target_ip if (sla_target_ip is defined and sla_target_ip | length > 0) else tunnel_peer_ip }}"

    - name: Read current prefix-list state
      cisco.ios.ios_command:
        commands: "show ip prefix-list {{ csr_pl_name | default('CSR_LIST', true) }}"
      register: pl_show
      failed_when: false

    - name: Parse existing seq numbers (if list exists)
      ansible.builtin.set_fact:
        pl_existing_seqs: >-
          {{
            (pl_show.stdout[0] | default('') | regex_findall('seq\s+(\d+)'))
            | map('int') | list
          }}

    - name: Compute starting next seq (multiples of 5)
      ansible.builtin.set_fact:
        pl_next_seq: "{{ ((pl_existing_seqs + [0]) | max | int) + 5 }}"

    - name: Show derived facts (debug)
      ansible.builtin.debug:
        msg:
          tunnel_peer_ip: "{{ tunnel_peer_ip }}"
          effective_sla_target: "{{ effective_sla_target }}"
          csr_pl_name: "{{ csr_pl_name | default('CSR_LIST', true) }}"
          pl_existing_seqs: "{{ pl_existing_seqs }}"
          pl_next_seq: "{{ pl_next_seq }}"
          pl_le_value: "{{ pl_le_value }}"
          pl_mask_bits: "{{ pl_mask_bits | default([]) }}"

  tasks:
    - name: Push generated config
      cisco.ios.ios_config:
        src: templates/add_tunnel.j2
      register: cfg

    - name: Save startup-config
      cisco.ios.ios_command:
        commands: write memory
      when: cfg.changed

    - name: Show pushed lines
      ansible.builtin.debug:
        var: cfg.commands
      when: cfg.changed

  post_tasks:
    - name: Verify — running-config BGP section
      cisco.ios.ios_command:
        commands:
          - "show running-config | section bgp"
      register: vfy_bgp
      changed_when: false

    - name: Verify — interface brief
      cisco.ios.ios_command:
        commands:
          - "show ip interface brief"
      register: vfy_intf
      changed_when: false

    - name: Print verification — BGP section
      ansible.builtin.debug:
        msg: "{{ vfy_bgp.stdout[0].splitlines() }}"

    - name: Print verification — interfaces
      ansible.builtin.debug:
        msg: "{{ vfy_intf.stdout[0].splitlines() }}"
