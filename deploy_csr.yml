---
- name: Modular CSR Configuration
  hosts: all
  gather_facts: no
  connection: network_cli

  tasks:
    - name: Generate the Config
      set_fact:
        generated_config: "{{ lookup('template', 'templates/add_tunnel.j2') }}"

    - name: DEBUG - Show me the generated config
      debug:
        var: generated_config

    - name: Apply Configuration
      cisco.ios.ios_config:
        lines: "{{ generated_config.splitlines() }}"
