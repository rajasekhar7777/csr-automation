---
- name: Modular CSR Configuration (Netmiko Path)
  hosts: all
  gather_facts: no
  connection: local  # This is the secret to fixing the AWX SSH error

  tasks:
    - name: Generate the Config from Template
      set_fact:
        generated_config: "{{ lookup('template', 'templates/add_tunnel.j2') }}"

    - name: Apply Configuration via Netmiko
      ansible.netcommon.netmiko_config:
        config_commands: "{{ generated_config.splitlines() }}"
        host: "{{ inventory_hostname }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        device_type: cisco_ios
