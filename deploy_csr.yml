
---
- name: Modular CSR Configuration (Bypass Fix)
  hosts: all
  gather_facts: no
  connection: local  # This tells AWX to bypass the restricted container SSH

  tasks:
    - name: Generate the Config
      set_fact:
        generated_config: "{{ lookup('template', 'templates/add_tunnel.j2') }}"

    - name: Push Config via Network CLI (Local mode)
      cisco.ios.ios_config:
        lines: "{{ generated_config.splitlines() }}"
      vars:
        # We manually pass the credentials because we are in local mode
        ansible_user: "{{ ansible_user }}"
        ansible_password: "{{ ansible_password }}"
        ansible_network_os: cisco.ios.ios
