---
- name: Modular CSR Configuration (AWX GUI Fix)
  hosts: all
  gather_facts: no
  connection: local  # This bypasses the AWX security lock

  tasks:
    - name: Generate the Config from Template
      set_fact:
        generated_config: "{{ lookup('template', 'templates/add_tunnel.j2') }}"

    - name: Apply Configuration via SSH Binary
      cisco.ios.ios_config:
        lines: "{{ generated_config.splitlines() }}"
      vars:
        # We manually bridge the AWX credentials to the local task
        ansible_user: "{{ ansible_user }}"
        ansible_password: "{{ ansible_password }}"
        ansible_network_os: cisco.ios.ios
