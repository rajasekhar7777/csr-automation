---
- name: Modular CSR Configuration
  hosts: all
  gather_facts: false
  # connection/network_os now come from inventory host_vars — remove from play
  tasks:
    - name: Generate and Apply Config
      cisco.ios.ios_config:
        src: templates/add_tunnel.j2          # ios_config natively renders Jinja
      register: cfg_result

    - name: Save running-config to startup
      cisco.ios.ios_command:
        commands: write memory
      when: cfg_result.changed
